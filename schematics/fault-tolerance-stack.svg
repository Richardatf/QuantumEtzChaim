<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Fault-tolerance translation stack</title><desc id="desc">A layered stack distinguishes physical quantum research from the project model.</desc><defs><linearGradient id="g" x2="1"><stop stop-color="#70c9c1" stop-opacity=".12"/><stop offset="1" stop-color="#d4b46a" stop-opacity=".12"/></linearGradient></defs><rect width="1200" height="760" rx="28" fill="#07100f"/><g font-family="system-ui,sans-serif"><text x="70" y="65" class="heading">FAULT-TOLERANCE STACK / TRANSLATION BOUNDARY</text><g transform="translate(90 115)"><rect width="1020" height="72" rx="14"/><text x="25" y="31" class="name">PHYSICAL QUBITS</text><text x="25" y="54" class="detail">devices · gates · connectivity</text><text x="990" y="42" class="research">RESEARCH DOMAIN</text></g><g transform="translate(90 210)"><rect width="1020" height="72" rx="14"/><text x="25" y="31" class="name">LOGICAL ENCODING</text><text x="25" y="54" class="detail">surface codes · qLDPC · erasure conversion</text><text x="990" y="42" class="research">RESEARCH DOMAIN</text></g><g transform="translate(90 305)"><rect width="1020" height="72" rx="14"/><text x="25" y="31" class="name">REAL-TIME CONTROL</text><text x="25" y="54" class="detail">syndrome extraction · decoding · feedback</text><text x="990" y="42" class="research">RESEARCH DOMAIN</text></g><g transform="translate(90 400)"><rect width="1020" height="72" rx="14"/><text x="25" y="31" class="name">SYSTEM CO-DESIGN</text><text x="25" y="54" class="detail">compiler · scheduler · runtime · measurement</text><text x="990" y="42" class="project">SHARED DESIGN LESSON</text></g><g transform="translate(90 495)"><rect width="1020" height="72" rx="14"/><text x="25" y="31" class="name">SEFIROTIC SERVICES</text><text x="25" y="54" class="detail">intent · formation · policy · coherence · output</text><text x="990" y="42" class="project">PROJECT MODEL</text></g><g transform="translate(90 590)"><rect width="1020" height="72" rx="14"/><text x="25" y="31" class="name">IVRITCODE MICROSTATE</text><text x="25" y="54" class="detail">23 registers · paths · gates · observations</text><text x="990" y="42" class="project">PROJECT IMPLEMENTATION</text></g><text x="600" y="720" class="foot">Structural inspiration is not scientific equivalence.</text></g><style>rect{fill:url(#g);stroke:#d4b46a;stroke-opacity:.4}.heading{fill:#d4b46a;font-size:17px;letter-spacing:4px}.name{fill:#eee9dc;font-size:15px;letter-spacing:2px}.detail{fill:#9ba9a3;font-size:13px}.research,.project{text-anchor:end;font-size:11px;letter-spacing:2px}.research{fill:#70c9c1}.project{fill:#d4b46a}.foot{text-anchor:middle;fill:#9ba9a3;font-size:12px}</style></svg>
