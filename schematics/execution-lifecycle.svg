<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc"><title id="title">Quantum Etz Chaim instruction lifecycle</title><desc id="desc">Ten deterministic stages carry an IvritCode instruction from parsing through output.</desc><rect width="1500" height="620" rx="26" fill="#07100f"/><g font-family="system-ui,sans-serif"><text x="70" y="70" class="heading">ONE INSTRUCTION / TEN STAGES / ONE TRACE</text><path d="M115 300H1375" stroke="#70c9c1" stroke-opacity=".35" stroke-width="3"/><g fill="#0f2420" stroke="#d4b46a"><g transform="translate(115 300)"><circle r="48"/><text y="5">PARSE</text><text y="-72" class="num">01</text><text y="95" class="owner">Binah</text></g><g transform="translate(255 300)"><circle r="48"/><text y="5">VALIDATE</text><text y="-72" class="num">02</text><text y="95" class="owner">Gevurah</text></g><g transform="translate(395 300)"><circle r="48"/><text y="5">CONTEXT</text><text y="-72" class="num">03</text><text y="95" class="owner">Keter</text></g><g transform="translate(535 300)"><circle r="48"/><text y="5">ACTIVATE</text><text y="-72" class="num">04</text><text y="95" class="owner">Path map</text></g><g transform="translate(675 300)"><circle r="48"/><text y="5">SERVICES</text><text y="-72" class="num">05</text><text y="95" class="owner">Node pair</text></g><g transform="translate(815 300)"><circle r="48"/><text y="5">TRANSFORM</text><text y="-72" class="num">06</text><text y="95" class="owner">Letter plane</text></g><g transform="translate(955 300)"><circle r="48"/><text y="5">SYNC</text><text y="-72" class="num">07</text><text y="95" class="owner">Yesod</text></g><g transform="translate(1095 300)"><circle r="48"/><text y="5">COHERE</text><text y="-72" class="num">08</text><text y="95" class="owner">Tiferet</text></g><g transform="translate(1235 300)"><circle r="48"/><text y="5">OBSERVE</text><text y="-72" class="num">09</text><text y="95" class="owner">Da’at</text></g><g transform="translate(1375 300)"><circle r="48"/><text y="5">OUTPUT</text><text y="-72" class="num">10</text><text y="95" class="owner">Malchut</text></g></g><rect x="70" y="480" width="1360" height="74" rx="18" fill="#d4b46a" fill-opacity=".06" stroke="#d4b46a" stroke-opacity=".35"/><text x="750" y="510" class="trace">DETERMINISTIC EVENT ENVELOPE</text><text x="750" y="535" class="sub">before state · instruction · services · path · gate · after state · coherence delta · observation</text></g><style>text{text-anchor:middle;fill:#eee9dc;font-size:12px}.heading{text-anchor:start;fill:#d4b46a;font-size:18px;letter-spacing:4px}.num{fill:#d4b46a}.owner{fill:#9ba9a3}.trace{font-size:14px;letter-spacing:2px}.sub{fill:#9ba9a3;font-size:13px}</style></svg>
